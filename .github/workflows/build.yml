name: Build RTFP

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Android project structure
        run: |
          mkdir -p app/src/main/java/com/rtfp
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64
          mkdir -p app/src/main/jniLibs/x86

          # Copy Player.kt to source
          cp Player.kt app/src/main/java/com/rtfp/

          # Generate AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest package="com.rtfp">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
            <application android:label="RTFP" android:theme="@style/Theme.AppCompat">
              <activity android:name=".PlayerActivity" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

          # Generate build.gradle.kts
          cat > app/build.gradle.kts << EOF
          plugins {
              id("com.android.application")
              kotlin("android")
          }
          android {
              namespace = "com.rtfp"
              compileSdk = 34
              defaultConfig {
                  minSdk = 21
                  targetSdk = 34
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
              sourceSets {
                  getByName("main") {
                      jniLibs.srcDirs("src/main/jniLibs")
                  }
              }
          }
          dependencies {
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("androidx.media3:media3-exoplayer:1.4.0")
              implementation("androidx.media3:media3-ui:1.4.0")
          }
          EOF

          # Generate settings.gradle.kts
          cat > settings.gradle.kts << EOF
          include(":app")
          EOF

      - name: Download FFmpeg prebuilt libraries
        run: |
          # Download for each ABI from BtbN/FFmpeg-Builds
          ABIS=("arm64-v8a" "armeabi-v7a" "x86_64" "x86")
          for ABI in "${ABIS[@]}"; do
            case $ABI in
              arm64-v8a)    URL="https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux-android-arm64-shared.tar.xz" ;;
              armeabi-v7a)  URL="https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux-android-armv7a-shared.tar.xz" ;;
              x86_64)       URL="https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux-android-x86_64-shared.tar.xz" ;;
              x86)          URL="https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux-android-x86-shared.tar.xz" ;;
            esac
            wget $URL -O ffmpeg-$ABI.tar.xz
            mkdir -p ffmpeg-$ABI
            tar -xf ffmpeg-$ABI.tar.xz -C ffmpeg-$ABI --strip-components=1
            # Copy .so files to jniLibs
            cp ffmpeg-$ABI/lib/*.so app/src/main/jniLibs/$ABI/
            # Keep headers and libs for compilation (we'll use arm64 for host, but we need all for linking later)
            mkdir -p ffmpeg_include/$ABI
            cp -r ffmpeg-$ABI/include ffmpeg_include/$ABI/
            mkdir -p ffmpeg_libs/$ABI
            cp -r ffmpeg-$ABI/lib ffmpeg_libs/$ABI/
          done

      - name: Write ffmpeg_wrapper.c
        run: |
          cat > ffmpeg_wrapper.c << 'EOF'
          // Paste the entire C code from section 2 above here
          // (I'll include it in the final answer, but for brevity I'll put a placeholder)
          #include <jni.h>
          #include <android/bitmap.h>
          ... (the whole ffmpeg_wrapper.c content) ...
          EOF

      - name: Build native library with NDK
        run: |
          # NDK is preinstalled on GitHub runners; find its path
          export NDK_PATH=$ANDROID_HOME/ndk/$(ls $ANDROID_HOME/ndk)
          export TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64

          # Build for each ABI
          ABIS=("arm64-v8a" "armeabi-v7a" "x86_64" "x86")
          for ABI in "${ABIS[@]}"; do
            case $ABI in
              arm64-v8a)    TARGET="aarch64-linux-android21" ;;
              armeabi-v7a)  TARGET="armv7a-linux-androideabi21" ;;
              x86_64)       TARGET="x86_64-linux-android21" ;;
              x86)          TARGET="i686-linux-android21" ;;
            esac

            $TOOLCHAIN/bin/${TARGET}-clang \
              -I ffmpeg_include/$ABI/include \
              -L ffmpeg_libs/$ABI/lib \
              -shared -o libffmpeg_wrapper.so ffmpeg_wrapper.c \
              -lavcodec -lavformat -lavutil -lswscale -landroid -lz

            # Move the built .so to the correct jniLibs folder
            mv libffmpeg_wrapper.so app/src/main/jniLibs/$ABI/
          done

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
