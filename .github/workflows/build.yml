name: Build RTFP Player

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo (contains workflow and overlay)
        uses: actions/checkout@v4

      - name: Clone aniyomi-mpv-lib
        run: git clone --depth 1 https://github.com/RepoDevil/aniyomi-mpv-lib.git player-core

      # ----- 1. Inject custom overlay -----
      - name: Create package directory and copy overlay
        run: |
          mkdir -p player-core/app/src/main/java/app/marlboroadvance/mpvex/ui/player
          cp PlayerOverlay.kt player-core/app/src/main/java/app/marlboroadvance/mpvex/ui/player/

      # ----- 2. Replace MainActivity with Compose version -----
      - name: Write new MainActivity
        run: |
          cat > player-core/app/src/main/java/is/xyz/mpv/MainActivity.kt << 'EOF'
          package is.xyz.mpv

          import android.os.Bundle
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.compose.foundation.layout.Box
          import androidx.compose.foundation.layout.fillMaxSize
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.viewinterop.AndroidView
          import app.marlboroadvance.mpvex.ui.player.PlayerOverlay

          class MainActivity : ComponentActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  MPVLib.init(this)   // required initialisation

                  setContent {
                      Box(modifier = Modifier.fillMaxSize()) {
                          AndroidView(
                              factory = { context -> MPVView(context) },
                              modifier = Modifier.matchParentSize()
                          )
                          PlayerOverlay()
                      }
                  }
              }
          }
          EOF

      # ----- 3. Enable Compose and add dependencies -----
      - name: Enable Compose in app/build.gradle
        run: |
          # Add composeOptions and buildFeatures
          sed -i '/android {/a \    buildFeatures {\n        compose true\n    }' player-core/app/build.gradle
          sed -i '/android {/a \    composeOptions {\n        kotlinCompilerExtensionVersion = "1.5.4"\n    }' player-core/app/build.gradle

          # Add Compose BOM and needed libraries to dependencies
          sed -i '/dependencies {/a \    implementation platform("androidx.compose:compose-bom:2024.02.00")\n    implementation "androidx.compose.ui:ui"\n    implementation "androidx.compose.material3:material3"\n    implementation "androidx.compose.ui:ui-tooling-preview"\n    implementation "androidx.activity:activity-compose:1.8.0"\n    implementation "dev.vivvvek:seeker:0.1.5"\n    implementation "org.jetbrains.kotlinx:kotlinx-collections-immutable:0.3.7"' player-core/app/build.gradle

      # ----- 4. Change app name to RTFP -----
      - name: Set app name
        run: |
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">RTFP<\/string>/' player-core/app/src/main/res/values/strings.xml

      # ----- 5. Set up JDK, SDK, cache, and build -----
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle and native build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            player-core/buildscripts/.cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('player-core/**/*.gradle*', 'player-core/buildscripts/**') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build native dependencies (FFmpeg, libmpv)
        working-directory: player-core/buildscripts
        run: ./build-all.sh   # This may take 30+ minutes

      - name: Build release APK
        working-directory: player-core
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RTFP-Player
          path: player-core/app/build/outputs/apk/release/*.apk
