name: 🚀 RTFP Auto-Generator & Builder (arm64-only)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📦 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🔧 Create Initial Gradle Files
      run: |
        mkdir -p gradle
        touch gradle.properties
        touch settings.gradle.kts
      
    - name: ☕ Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: 🏗️ Generate Project Structure
      run: |
        mkdir -p app/src/main/java/com/rtfp/player
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        mkdir -p app/src/main/res/values
        mkdir -p gradle/wrapper
        
    - name: 📝 Generate MainActivity.kt
      run: |
        cat > app/src/main/java/com/rtfp/player/MainActivity.kt << 'KOTLIN_EOF'
        package com.rtfp.player
        
        import android.app.Activity
        import android.content.Intent
        import android.content.pm.PackageManager
        import android.net.Uri
        import android.os.Build
        import android.os.Bundle
        import android.view.View
        import android.view.WindowManager
        import android.widget.FrameLayout
        import android.widget.Toast
        import androidx.core.app.ActivityCompat
        import androidx.core.content.ContextCompat
        import `is`.xyz.mpv.MPVView
        
        class MainActivity : Activity() {
            private var mpvView: MPVView? = null
            private val PERMISSION_REQUEST_CODE = 100
            
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                
                enableImmersiveMode()
                window.addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON)
                
                mpvView = MPVView(this)
                
                val container = FrameLayout(this).apply {
                    addView(mpvView, FrameLayout.LayoutParams(
                        FrameLayout.LayoutParams.MATCH_PARENT,
                        FrameLayout.LayoutParams.MATCH_PARENT
                    ).apply {
                        gravity = android.view.Gravity.CENTER
                    })
                }
                
                setContentView(container)
                
                mpvView?.initialize(applicationInfo.nativeLibraryDir)
                configureMPV()
                
                // Request permissions
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                    if (ContextCompat.checkSelfPermission(this, android.Manifest.permission.READ_MEDIA_VIDEO) != PackageManager.PERMISSION_GRANTED ||
                        ContextCompat.checkSelfPermission(this, android.Manifest.permission.READ_MEDIA_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                        ActivityCompat.requestPermissions(this, 
                            arrayOf(android.Manifest.permission.READ_MEDIA_VIDEO, android.Manifest.permission.READ_MEDIA_AUDIO), 
                            PERMISSION_REQUEST_CODE)
                    } else {
                        handleIntent(intent)
                    }
                } else if (Build.VERSION.SDK_INT <= Build.VERSION_CODES.P) {
                    if (ContextCompat.checkSelfPermission(this, android.Manifest.permission.READ_EXTERNAL_STORAGE) != PackageManager.PERMISSION_GRANTED) {
                        ActivityCompat.requestPermissions(this, 
                            arrayOf(android.Manifest.permission.READ_EXTERNAL_STORAGE), 
                            PERMISSION_REQUEST_CODE)
                    } else {
                        handleIntent(intent)
                    }
                } else {
                    handleIntent(intent)
                }
            }
            
            override fun onRequestPermissionsResult(requestCode: Int, permissions: Array<String>, grantResults: IntArray) {
                super.onRequestPermissionsResult(requestCode, permissions, grantResults)
                if (requestCode == PERMISSION_REQUEST_CODE) {
                    if (grantResults.all { it == PackageManager.PERMISSION_GRANTED }) {
                        handleIntent(intent)
                    } else {
                        Toast.makeText(this, "Permissions required to play videos", Toast.LENGTH_LONG).show()
                    }
                }
            }
            
            override fun onNewIntent(intent: Intent?) {
                super.onNewIntent(intent)
                setIntent(intent)
                handleIntent(intent)
            }
            
            private fun handleIntent(intent: Intent?) {
                val videoUri: Uri? = when (intent?.action) {
                    Intent.ACTION_VIEW -> intent.data
                    Intent.ACTION_SEND -> intent.getParcelableExtra(Intent.EXTRA_STREAM)
                    else -> null
                }
                
                videoUri?.let { uri ->
                    val path = when (uri.scheme) {
                        "content" -> {
                            try {
                                contentResolver.openFileDescriptor(uri, "r")?.use { pfd ->
                                    "/proc/self/fd/${pfd.fd}"
                                }
                            } catch (e: Exception) {
                                copyUriToCache(uri)
                            }
                        }
                        "file" -> uri.path
                        else -> uri.toString()
                    }
                    
                    path?.let {
                        mpvView?.command(arrayOf("loadfile", it))
                        mpvView?.command(arrayOf("set", "pause", "no"))
                    }
                }
            }
            
            private fun copyUriToCache(uri: Uri): String? {
                return try {
                    val inputStream = contentResolver.openInputStream(uri) ?: return null
                    val file = java.io.File(cacheDir, "video_${System.currentTimeMillis()}.mp4")
                    file.outputStream().use { output ->
                        inputStream.copyTo(output)
                    }
                    file.absolutePath
                } catch (e: Exception) {
                    e.printStackTrace()
                    null
                }
            }
            
            private fun configureMPV() {
                mpvView?.apply {
                    command(arrayOf("set", "hwdec", "auto-safe"))
                    command(arrayOf("set", "keepaspect", "yes"))
                    command(arrayOf("set", "panscan", "0.0"))
                    command(arrayOf("set", "scale", "bilinear"))
                    command(arrayOf("set", "video-sync", "audio"))
                    command(arrayOf("set", "cache", "yes"))
                    command(arrayOf("set", "demuxer-max-bytes", "150M"))
                }
            }
            
            private fun enableImmersiveMode() {
                window.decorView.systemUiVisibility = (
                    View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                    or View.SYSTEM_UI_FLAG_FULLSCREEN
                    or View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                    or View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                    or View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                    or View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                )
            }
            
            override fun onWindowFocusChanged(hasFocus: Boolean) {
                super.onWindowFocusChanged(hasFocus)
                if (hasFocus) enableImmersiveMode()
            }
            
            override fun onResume() {
                super.onResume()
                mpvView?.command(arrayOf("set", "pause", "no"))
                enableImmersiveMode()
            }
            
            override fun onPause() {
                mpvView?.command(arrayOf("set", "pause", "yes"))
                super.onPause()
            }
            
            override fun onDestroy() {
                mpvView?.destroy()
                mpvView = null
                super.onDestroy()
            }
        }
        KOTLIN_EOF
        
    - name: 📄 Generate AndroidManifest.xml
      run: |
        cat > app/src/main/AndroidManifest.xml << 'XML_EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:tools="http://schemas.android.com/tools">
        
            <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
            <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                android:maxSdkVersion="32" />
            <uses-permission android:name="android.permission.WAKE_LOCK" />
            <uses-permission android:name="android.permission.INTERNET" />
        
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="RTFP"
                android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen"
                android:hardwareAccelerated="true"
                android:largeHeap="true"
                tools:targetApi="31">
                
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTask"
                    android:configChanges="orientation|screenSize|screenLayout|keyboardHidden"
                    android:supportsPictureInPicture="false">
                    
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                    
                    <intent-filter>
                        <action android:name="android.intent.action.VIEW" />
                        <category android:name="android.intent.category.DEFAULT" />
                        <category android:name="android.intent.category.BROWSABLE" />
                        <data android:mimeType="video/*" />
                    </intent-filter>
                    
                    <intent-filter>
                        <action android:name="android.intent.action.VIEW" />
                        <category android:name="android.intent.category.DEFAULT" />
                        <data android:scheme="file" />
                        <data android:scheme="content" />
                        <data android:mimeType="video/mp4" />
                        <data android:mimeType="video/x-matroska" />
                        <data android:mimeType="video/webm" />
                        <data android:mimeType="video/avi" />
                        <data android:mimeType="video/x-msvideo" />
                        <data android:mimeType="video/quicktime" />
                    </intent-filter>
                    
                    <intent-filter>
                        <action android:name="android.intent.action.SEND" />
                        <category android:name="android.intent.category.DEFAULT" />
                        <data android:mimeType="video/*" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        XML_EOF
        
    - name: 🎨 Generate App Icons
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick
        convert -size 48x48 xc:"#00BCD4" app/src/main/res/mipmap-mdpi/ic_launcher.png
        convert -size 72x72 xc:"#00BCD4" app/src/main/res/mipmap-hdpi/ic_launcher.png
        convert -size 96x96 xc:"#00BCD4" app/src/main/res/mipmap-xhdpi/ic_launcher.png
        convert -size 144x144 xc:"#00BCD4" app/src/main/res/mipmap-xxhdpi/ic_launcher.png
        convert -size 192x192 xc:"#00BCD4" app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
        
    - name: 🎨 Generate strings.xml
      run: |
        cat > app/src/main/res/values/strings.xml << 'XML_EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">RTFP</string>
        </resources>
        XML_EOF
        
    - name: 🔧 Generate app/build.gradle.kts (arm64-only)
      run: |
        cat > app/build.gradle.kts << 'GRADLE_EOF'
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
        }
        
        android {
            namespace = "com.rtfp.player"
            compileSdk = 35
        
            defaultConfig {
                applicationId = "com.rtfp.player"
                minSdk = 25
                targetSdk = 35
                versionCode = 1
                versionName = "1.0.0"
                
                ndk {
                    abiFilters.add("arm64-v8a")   // only arm64
                }
            }
            
            // No ABI splits needed; just one APK
            buildTypes {
                release {
                    isMinifyEnabled = true
                    isShrinkResources = true
                    proguardFiles(
                        getDefaultProguardFile("proguard-android-optimize.txt"),
                        "proguard-rules.pro"
                    )
                }
            }
            
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
            
            kotlinOptions {
                jvmTarget = "17"
            }
            
            packaging {
                resources {
                    excludes += "/META-INF/{AL2.0,LGPL2.1}"
                }
            }
        }
        
        dependencies {
            implementation("io.github.abdallahmehiz:mpv-android-lib:0.1.14")
            implementation("androidx.core:core-ktx:1.12.0")
        }
        GRADLE_EOF
        
    - name: 🔧 Generate ProGuard Rules
      run: |
        cat > app/proguard-rules.pro << 'PROGUARD_EOF'
        -keep class `is`.xyz.mpv.** { *; }
        -keepclassmembers class `is`.xyz.mpv.** { *; }
        -keepclasseswithmembernames class * {
            native <methods>;
        }
        -keep class android.os.ParcelFileDescriptor { *; }
        PROGUARD_EOF
        
    - name: 🔧 Generate Root build.gradle.kts
      run: |
        cat > build.gradle.kts << 'GRADLE_EOF'
        plugins {
            id("com.android.application") version "8.7.3" apply false
            id("org.jetbrains.kotlin.android") version "2.1.0" apply false
        }
        GRADLE_EOF
        
    - name: 🔧 Generate settings.gradle.kts
      run: |
        cat > settings.gradle.kts << 'GRADLE_EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        
        rootProject.name = "RTFP"
        include(":app")
        GRADLE_EOF
        
    - name: 🔧 Generate gradle.properties
      run: |
        cat > gradle.properties << 'PROPS_EOF'
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.enableJetifier=false
        kotlin.code.style=official
        android.nonTransitiveRClass=true
        android.defaults.buildfeatures.buildconfig=true
        PROPS_EOF
        
    - name: 🔧 Download Gradle Wrapper
      run: |
        wget https://services.gradle.org/distributions/gradle-8.11.1-bin.zip
        unzip -q gradle-8.11.1-bin.zip
        ./gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1
        chmod +x gradlew
        
    - name: 🔍 List Dependencies (Debug)
      run: ./gradlew app:dependencies --configuration releaseCompileClasspath
        
    - name: 🏗️ Build APK (arm64-v8a)
      run: |
        ./gradlew assembleRelease --no-daemon --stacktrace --info 2>&1 | tee build.log
        
    - name: ✅ Verify APK Exists
      run: |
        if [ ! -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
          echo "❌ APK not found! Build failed."
          exit 1
        fi
        
    - name: 📤 Upload Build Log (on failure only)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        
    - name: 📦 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: RTFP-arm64
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        
    - name: 🎉 Build Summary
      run: |
        echo "## ✅ RTFP Video Player Built Successfully!" >> $GITHUB_STEP_SUMMARY
        echo "APK for arm64-v8a is ready for download." >> $GITHUB_STEP_SUMMARY
