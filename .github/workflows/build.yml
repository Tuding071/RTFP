name: 🚀 RTFP Auto-Generator & Builder

# This SINGLE YML file will:
# 1. Generate entire Android project from scratch
# 2. Create all source files, manifests, gradle configs
# 3. Build APK automatically
# 4. Release it as artifact

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📦 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🔧 Create Initial Gradle Files for Cache
      run: |
        # Create minimal gradle files so cache can work
        mkdir -p gradle
        touch gradle.properties
        touch settings.gradle.kts
        echo "✅ Initial files created for cache"
      
    - name: ☕ Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: 🏗️ Generate Complete Project Structure
      run: |
        # Create directory structure
        mkdir -p app/src/main/java/com/rtfp/player
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        mkdir -p app/src/main/res/values
        mkdir -p gradle/wrapper
        
        echo "✅ Project structure created"
        
    - name: 📝 Generate MainActivity.kt
      run: |
        cat > app/src/main/java/com/rtfp/player/MainActivity.kt << 'KOTLIN_EOF'
        package com.rtfp.player
        
        import android.app.Activity
        import android.content.Intent
        import android.net.Uri
        import android.os.Bundle
        import android.view.View
        import android.view.WindowManager
        import android.widget.FrameLayout
        import `is`.xyz.mpv.MPVView
        
        class MainActivity : Activity() {
            private var mpvView: MPVView? = null
            
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                
                // Immersive fullscreen mode
                enableImmersiveMode()
                
                // Keep screen on during playback
                window.addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON)
                
                // Create MPV view
                mpvView = MPVView(this)
                
                // Setup container with center gravity
                val container = FrameLayout(this).apply {
                    addView(mpvView, FrameLayout.LayoutParams(
                        FrameLayout.LayoutParams.MATCH_PARENT,
                        FrameLayout.LayoutParams.MATCH_PARENT
                    ).apply {
                        gravity = android.view.Gravity.CENTER
                    })
                }
                
                setContentView(container)
                
                // Initialize MPV
                mpvView?.initialize(applicationInfo.nativeLibraryDir)
                
                // Configure MPV
                configureMPV()
                
                // Handle intent
                handleIntent(intent)
            }
            
            override fun onNewIntent(intent: Intent?) {
                super.onNewIntent(intent)
                setIntent(intent)
                handleIntent(intent)
            }
            
            private fun handleIntent(intent: Intent?) {
                val videoUri: Uri? = when (intent?.action) {
                    Intent.ACTION_VIEW -> intent.data
                    Intent.ACTION_SEND -> intent.getParcelableExtra(Intent.EXTRA_STREAM)
                    else -> null
                }
                
                videoUri?.let { uri ->
                    val path = when (uri.scheme) {
                        "content" -> {
                            // Handle content:// URIs
                            try {
                                contentResolver.openFileDescriptor(uri, "r")?.use { pfd ->
                                    "/proc/self/fd/${pfd.fd}"
                                }
                            } catch (e: Exception) {
                                uri.toString()
                            }
                        }
                        "file" -> uri.path
                        else -> uri.toString()
                    }
                    
                    path?.let {
                        mpvView?.command(arrayOf("loadfile", it))
                        mpvView?.command(arrayOf("set", "pause", "no"))
                    }
                }
            }
            
            private fun configureMPV() {
                mpvView?.apply {
                    // Hardware decoding
                    command(arrayOf("set", "hwdec", "auto-safe"))
                    
                    // Video scaling - fit to screen
                    command(arrayOf("set", "keepaspect", "yes"))
                    command(arrayOf("set", "panscan", "0.0"))
                    
                    // Better quality
                    command(arrayOf("set", "scale", "bilinear"))
                    
                    // Sync
                    command(arrayOf("set", "video-sync", "audio"))
                    
                    // Cache
                    command(arrayOf("set", "cache", "yes"))
                    command(arrayOf("set", "demuxer-max-bytes", "150M"))
                }
            }
            
            private fun enableImmersiveMode() {
                window.decorView.systemUiVisibility = (
                    View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                    or View.SYSTEM_UI_FLAG_FULLSCREEN
                    or View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                    or View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                    or View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                    or View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                )
            }
            
            override fun onWindowFocusChanged(hasFocus: Boolean) {
                super.onWindowFocusChanged(hasFocus)
                if (hasFocus) enableImmersiveMode()
            }
            
            override fun onResume() {
                super.onResume()
                mpvView?.command(arrayOf("set", "pause", "no"))
                enableImmersiveMode()
            }
            
            override fun onPause() {
                mpvView?.command(arrayOf("set", "pause", "yes"))
                super.onPause()
            }
            
            override fun onDestroy() {
                mpvView?.destroy()
                mpvView = null
                super.onDestroy()
            }
        }
        KOTLIN_EOF
        
        echo "✅ MainActivity.kt generated"
        
    - name: 📄 Generate AndroidManifest.xml
      run: |
        cat > app/src/main/AndroidManifest.xml << 'XML_EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:tools="http://schemas.android.com/tools">
        
            <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
            <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                android:maxSdkVersion="32" />
            <uses-permission android:name="android.permission.WAKE_LOCK" />
            <uses-permission android:name="android.permission.INTERNET" />
        
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="RTFP"
                android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen"
                android:hardwareAccelerated="true"
                android:largeHeap="true"
                tools:targetApi="31">
                
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTask"
                    android:configChanges="orientation|screenSize|screenLayout|keyboardHidden"
                    android:supportsPictureInPicture="false">
                    
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                    
                    <!-- View video files -->
                    <intent-filter>
                        <action android:name="android.intent.action.VIEW" />
                        <category android:name="android.intent.category.DEFAULT" />
                        <category android:name="android.intent.category.BROWSABLE" />
                        <data android:mimeType="video/*" />
                    </intent-filter>
                    
                    <!-- All video formats -->
                    <intent-filter>
                        <action android:name="android.intent.action.VIEW" />
                        <category android:name="android.intent.category.DEFAULT" />
                        <data android:scheme="file" />
                        <data android:scheme="content" />
                        <data android:mimeType="video/mp4" />
                        <data android:mimeType="video/x-matroska" />
                        <data android:mimeType="video/webm" />
                        <data android:mimeType="video/avi" />
                        <data android:mimeType="video/x-msvideo" />
                        <data android:mimeType="video/quicktime" />
                    </intent-filter>
                    
                    <!-- Send video -->
                    <intent-filter>
                        <action android:name="android.intent.action.SEND" />
                        <category android:name="android.intent.category.DEFAULT" />
                        <data android:mimeType="video/*" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        XML_EOF
        
        echo "✅ AndroidManifest.xml generated"
        
    - name: 🎨 Generate App Icon (Solid Color)
      run: |
        # Install ImageMagick
        sudo apt-get update
        sudo apt-get install -y imagemagick
        
        # Generate solid color icon (teal/cyan - video player theme)
        # Different sizes for different densities
        convert -size 48x48 xc:"#00BCD4" app/src/main/res/mipmap-mdpi/ic_launcher.png
        convert -size 72x72 xc:"#00BCD4" app/src/main/res/mipmap-hdpi/ic_launcher.png
        convert -size 96x96 xc:"#00BCD4" app/src/main/res/mipmap-xhdpi/ic_launcher.png
        convert -size 144x144 xc:"#00BCD4" app/src/main/res/mipmap-xxhdpi/ic_launcher.png
        convert -size 192x192 xc:"#00BCD4" app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
        
        echo "✅ App icons generated"
        
    - name: 🎨 Generate strings.xml
      run: |
        cat > app/src/main/res/values/strings.xml << 'XML_EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">RTFP</string>
        </resources>
        XML_EOF
        
        echo "✅ strings.xml generated"
        
    - name: 🔧 Generate app/build.gradle.kts
      run: |
        cat > app/build.gradle.kts << 'GRADLE_EOF'
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
        }
        
        android {
            namespace = "com.rtfp.player"
            compileSdk = 35
        
            defaultConfig {
                applicationId = "com.rtfp.player"
                minSdk = 25
                targetSdk = 35
                versionCode = 1
                versionName = "1.0.0"
                
                ndk {
                    abiFilters.addAll(listOf("armeabi-v7a", "arm64-v8a", "x86", "x86_64"))
                }
            }
            
            splits {
                abi {
                    isEnable = true
                    reset()
                    include("armeabi-v7a", "arm64-v8a", "x86", "x86_64")
                    isUniversalApk = true
                }
            }
        
            buildTypes {
                release {
                    isMinifyEnabled = true
                    isShrinkResources = true
                    proguardFiles(
                        getDefaultProguardFile("proguard-android-optimize.txt"),
                        "proguard-rules.pro"
                    )
                }
            }
            
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
            
            kotlinOptions {
                jvmTarget = "17"
            }
            
            packaging {
                resources {
                    excludes += "/META-INF/{AL2.0,LGPL2.1}"
                }
            }
        }
        
        dependencies {
            // Using the latest version of mpv-android-lib
            implementation("io.github.abdallahmehiz:mpv-android-lib:0.1.12")
        }
        GRADLE_EOF
        
        echo "✅ app/build.gradle.kts generated"
        
    - name: 🔧 Generate ProGuard Rules
      run: |
        cat > app/proguard-rules.pro << 'PROGUARD_EOF'
        # Keep MPV native methods
        -keep class `is`.xyz.mpv.** { *; }
        -keepclassmembers class `is`.xyz.mpv.** { *; }
        
        # Keep native methods
        -keepclasseswithmembernames class * {
            native <methods>;
        }
        PROGUARD_EOF
        
        echo "✅ proguard-rules.pro generated"
        
    - name: 🔧 Generate Root build.gradle.kts
      run: |
        cat > build.gradle.kts << 'GRADLE_EOF'
        plugins {
            id("com.android.application") version "8.7.3" apply false
            id("org.jetbrains.kotlin.android") version "2.1.0" apply false
        }
        GRADLE_EOF
        
        echo "✅ Root build.gradle.kts generated"
        
    - name: 🔧 Generate settings.gradle.kts
      run: |
        cat > settings.gradle.kts << 'GRADLE_EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        
        rootProject.name = "RTFP"
        include(":app")
        GRADLE_EOF
        
        echo "✅ settings.gradle.kts generated"
        
    - name: 🔧 Generate gradle.properties
      run: |
        cat > gradle.properties << 'PROPS_EOF'
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.enableJetifier=false
        kotlin.code.style=official
        android.nonTransitiveRClass=true
        android.defaults.buildfeatures.buildconfig=true
        PROPS_EOF
        
        echo "✅ gradle.properties generated"
        
    - name: 🔧 Download Gradle Wrapper
      run: |
        # Download gradle wrapper
        wget https://services.gradle.org/distributions/gradle-8.11.1-bin.zip
        unzip -q gradle-8.11.1-bin.zip
        
        # Generate wrapper
        ./gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1
        
        chmod +x gradlew
        
        echo "✅ Gradle wrapper configured"

        
    - name: 🏗️ Build APK
      run: |
        ./gradlew assembleRelease --no-daemon --stacktrace
        
        echo "✅ APK built successfully!"
        
    - name: 📦 Upload Universal APK
      uses: actions/upload-artifact@v4
      with:
        name: RTFP-universal
        path: app/build/outputs/apk/release/*-universal-release-unsigned.apk
        
    - name: 📦 Upload All APKs
      uses: actions/upload-artifact@v4
      with:
        name: RTFP-all-apks
        path: app/build/outputs/apk/release/*.apk
        
    - name: 🎉 Build Summary
      run: |
        echo "## 🎬 RTFP Video Player Built Successfully! 🎉" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📱 Features:" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Immersive fullscreen playback" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Auto-fit video to screen (maintains aspect ratio)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Center gravity for perfect positioning" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Hardware acceleration enabled" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Opens from file managers" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Handles all video formats (mpv/ffmpeg)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Proper lifecycle management" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Screen stays on during playback" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Generated APKs:" >> $GITHUB_STEP_SUMMARY
        ls -lh app/build/outputs/apk/release/*.apk >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Download from the Artifacts section above! 🚀" >> $GITHUB_STEP_SUMMARY
