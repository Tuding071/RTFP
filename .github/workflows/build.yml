name: Build RTFP

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm yasm pkg-config

      - name: Generate Android project structure
        run: |
          mkdir -p app/src/main/java/com/rtfp
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/jniLibs/arm64-v8a

          cp Player.kt app/src/main/java/com/rtfp/

          cat > gradle.properties << EOF
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle.kts << EOF
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.4.0")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.23")
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          cat > settings.gradle.kts << EOF
          include(":app")
          EOF

          cat > app/build.gradle.kts << EOF
          plugins {
              id("com.android.application")
              id("kotlin-android")
          }
          android {
              namespace = "com.rtfp"
              compileSdk = 34
              defaultConfig {
                  minSdk = 21
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
              sourceSets {
                  getByName("main") {
                      jniLibs.srcDirs("src/main/jniLibs")
                  }
              }
          }
          dependencies {
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("androidx.media3:media3-exoplayer:1.4.0")
              implementation("androidx.media3:media3-ui:1.4.0")
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
            <application android:label="RTFP" android:theme="@style/Theme.AppCompat.NoActionBar">
              <activity android:name=".PlayerActivity" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

      - name: Cache FFmpeg build
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ffmpeg_src/install
          key: ${{ runner.os }}-ffmpeg-6.0-arm64-v8a

      - name: Download FFmpeg source (if not cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          wget https://ffmpeg.org/releases/ffmpeg-6.0.tar.xz
          tar -xf ffmpeg-6.0.tar.xz
          mv ffmpeg-6.0 ffmpeg_src

      - name: Build FFmpeg for arm64-v8a (if not cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          export NDK_DIR=$(ls -d $ANDROID_HOME/ndk/* | head -n1)
          export TOOLCHAIN=$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64
          export ABI="arm64-v8a"
          export TRIPLE="aarch64-linux-android"
          export API_LEVEL=21

          cd ffmpeg_src

          ./configure \
            --prefix=./install/$ABI \
            --enable-static \
            --disable-shared \
            --disable-programs \
            --disable-doc \
            --disable-everything \
            --enable-decoder=h264 \
            --enable-decoder=hevc \
            --enable-parser=h264 \
            --enable-parser=hevc \
            --enable-demuxer=mov \
            --enable-demuxer=matroska \
            --enable-protocol=file \
            --target-os=android \
            --arch=aarch64 \
            --cc=$TOOLCHAIN/bin/${TRIPLE}${API_LEVEL}-clang \
            --cxx=$TOOLCHAIN/bin/${TRIPLE}${API_LEVEL}-clang++ \
            --ar=$TOOLCHAIN/bin/llvm-ar \
            --ranlib=$TOOLCHAIN/bin/llvm-ranlib \
            --strip=$TOOLCHAIN/bin/llvm-strip \
            --sysroot=$TOOLCHAIN/sysroot \
            --extra-cflags="-fPIC" \
            --enable-cross-compile \
            --disable-asm

          make -j$(nproc)
          make install
          cd ..

      - name: Write ffmpeg_wrapper.c
        run: |
          cat > ffmpeg_wrapper.c << 'EOF'
          // (your same wrapper code stays here)
          EOF

      - name: Build native wrapper library for arm64-v8a
        run: |
          export NDK_DIR=$(ls -d $ANDROID_HOME/ndk/* | head -n1)
          export TOOLCHAIN=$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64
          export ABI="arm64-v8a"
          export TRIPLE="aarch64-linux-android"
          export API_LEVEL=21
          export SYSROOT=$TOOLCHAIN/sysroot

          $TOOLCHAIN/bin/${TRIPLE}${API_LEVEL}-clang \
            ffmpeg_wrapper.c \
            -I ffmpeg_src/install/$ABI/include \
            -L ffmpeg_src/install/$ABI/lib \
            -L$SYSROOT/usr/lib/$TRIPLE/$API_LEVEL \
            --sysroot=$SYSROOT \
            -shared -o libffmpeg_wrapper.so \
            -Wl,--no-undefined \
            -lavformat -lavcodec -lavutil -lswscale \
            -landroid -lz -lm

          mv libffmpeg_wrapper.so app/src/main/jniLibs/$ABI/

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
