name: Build RTFP

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm yasm pkg-config

      - name: Generate Android project structure
        run: |
          # Create directories
          mkdir -p app/src/main/java/com/rtfp
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/jniLibs/arm64-v8a

          # Copy Player.kt
          cp Player.kt app/src/main/java/com/rtfp/

          # gradle.properties
          cat > gradle.properties << EOF
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          # root build.gradle.kts
          cat > build.gradle.kts << EOF
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.4.0")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.23")
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          # settings.gradle.kts
          cat > settings.gradle.kts << EOF
          include(":app")
          EOF

          # app/build.gradle.kts
          cat > app/build.gradle.kts << EOF
          plugins {
              id("com.android.application")
              id("kotlin-android")
          }
          android {
              namespace = "com.rtfp"
              compileSdk = 34
              defaultConfig {
                  minSdk = 21
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
              sourceSets {
                  getByName("main") {
                      jniLibs.srcDirs("src/main/jniLibs")
                  }
              }
          }
          dependencies {
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("androidx.media3:media3-exoplayer:1.4.0")
              implementation("androidx.media3:media3-ui:1.4.0")
          }
          EOF

          # AndroidManifest.xml with intent filters
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
            <application android:label="RTFP" android:theme="@style/Theme.AppCompat.NoActionBar">
              <activity android:name=".PlayerActivity" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
                <intent-filter>
                  <action android:name="android.intent.action.VIEW" />
                  <category android:name="android.intent.category.DEFAULT" />
                  <data android:scheme="file" />
                  <data android:mimeType="video/*" />
                  <data android:scheme="content" />
                  <data android:mimeType="video/*" />
                </intent-filter>
                <intent-filter>
                  <action android:name="android.intent.action.VIEW" />
                  <category android:name="android.intent.category.DEFAULT" />
                  <data android:scheme="file" />
                  <data android:host="*" />
                  <data android:pathPattern=".*\\.mp4" />
                  <data android:pathPattern=".*\\.mkv" />
                  <data android:pathPattern=".*\\.avi" />
                  <data android:pathPattern=".*\\.mov" />
                  <data android:pathPattern=".*\\.3gp" />
                  <data android:pathPattern=".*\\.webm" />
                  <data android:pathPattern=".*\\.ts" />
                  <data android:pathPattern=".*\\.m4v" />
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

      - name: Cache FFmpeg build
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ffmpeg_src/install
          key: ${{ runner.os }}-ffmpeg-6.0-arm64-v8a

      - name: Download FFmpeg source (if not cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          wget https://ffmpeg.org/releases/ffmpeg-6.0.tar.xz
          tar -xf ffmpeg-6.0.tar.xz
          mv ffmpeg-6.0 ffmpeg_src

      - name: Build FFmpeg for arm64-v8a (if not cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          export NDK_DIR=$(ls -d $ANDROID_HOME/ndk/* | head -n1)
          export TOOLCHAIN=$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64
          export ABI="arm64-v8a"
          export TRIPLE="aarch64-linux-android"
          export API_LEVEL=21

          cd ffmpeg_src

          ./configure \
            --prefix=./install/$ABI \
            --enable-static \
            --disable-shared \
            --disable-programs \
            --disable-doc \
            --disable-avdevice \
            --disable-swresample \
            --disable-postproc \
            --disable-avfilter \
            --disable-network \
            --disable-everything \
            --enable-decoder=h264 \
            --enable-decoder=hevc \
            --enable-decoder=mpeg4 \
            --enable-decoder=mpeg2video \
            --enable-decoder=vp8 \
            --enable-decoder=vp9 \
            --enable-decoder=aac \
            --enable-decoder=mp3 \
            --enable-parser=h264 \
            --enable-parser=hevc \
            --enable-demuxer=mov \
            --enable-demuxer=matroska \
            --enable-demuxer=avi \
            --enable-demuxer=mpegts \
            --enable-protocol=file \
            --target-os=android \
            --arch=aarch64 \
            --cc=$TOOLCHAIN/bin/${TRIPLE}${API_LEVEL}-clang \
            --cxx=$TOOLCHAIN/bin/${TRIPLE}${API_LEVEL}-clang++ \
            --ar=$TOOLCHAIN/bin/llvm-ar \
            --ranlib=$TOOLCHAIN/bin/llvm-ranlib \
            --strip=$TOOLCHAIN/bin/llvm-strip \
            --sysroot=$TOOLCHAIN/sysroot \
            --extra-cflags="-fPIC" \
            --enable-cross-compile \
            --disable-asm

          make -j$(nproc)
          make install
          cd ..

      - name: Write ffmpeg_wrapper.c
        run: |
          cat > ffmpeg_wrapper.c << 'EOF'
          #include <jni.h>
          #include <android/bitmap.h>
          #include <libavcodec/avcodec.h>
          #include <libavformat/avformat.h>
          #include <libswscale/swscale.h>
          #include <libavutil/imgutils.h>
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>

          typedef struct {
              AVFormatContext *fmt_ctx;
              AVCodecContext *codec_ctx;
              int video_stream_index;
              AVFrame *frame;
              AVFrame *rgb_frame;
              uint8_t *rgb_buffer;
              struct SwsContext *sws_ctx;
              int width;
              int height;
          } VideoState;

          static int open_video_file(VideoState *vs, const char *filename) {
              if (avformat_open_input(&vs->fmt_ctx, filename, NULL, NULL) < 0) return -1;
              if (avformat_find_stream_info(vs->fmt_ctx, NULL) < 0) return -1;

              vs->video_stream_index = -1;
              for (int i = 0; i < vs->fmt_ctx->nb_streams; i++) {
                  if (vs->fmt_ctx->streams[i]->codecpar->codec_type == AVMEDIA_TYPE_VIDEO) {
                      vs->video_stream_index = i;
                      break;
                  }
              }
              if (vs->video_stream_index == -1) return -1;

              AVCodecParameters *codecpar = vs->fmt_ctx->streams[vs->video_stream_index]->codecpar;
              const AVCodec *codec = avcodec_find_decoder(codecpar->codec_id);
              if (!codec) return -1;

              vs->codec_ctx = avcodec_alloc_context3(codec);
              if (!vs->codec_ctx) return -1;
              if (avcodec_parameters_to_context(vs->codec_ctx, codecpar) < 0) return -1;
              if (avcodec_open2(vs->codec_ctx, codec, NULL) < 0) return -1;

              vs->width = vs->codec_ctx->width;
              vs->height = vs->codec_ctx->height;

              vs->frame = av_frame_alloc();
              vs->rgb_frame = av_frame_alloc();
              if (!vs->frame || !vs->rgb_frame) return -1;

              int num_bytes = av_image_get_buffer_size(AV_PIX_FMT_RGBA, vs->width, vs->height, 1);
              vs->rgb_buffer = (uint8_t*)av_malloc(num_bytes);
              av_image_fill_arrays(vs->rgb_frame->data, vs->rgb_frame->linesize,
                                   vs->rgb_buffer, AV_PIX_FMT_RGBA,
                                   vs->width, vs->height, 1);

              vs->sws_ctx = sws_getContext(vs->width, vs->height, vs->codec_ctx->pix_fmt,
                                           vs->width, vs->height, AV_PIX_FMT_RGBA,
                                           SWS_BILINEAR, NULL, NULL, NULL);
              if (!vs->sws_ctx) return -1;

              return 0;
          }

          static int seek_and_decode(VideoState *vs, int64_t timestamp_us) {
              AVStream *stream = vs->fmt_ctx->streams[vs->video_stream_index];
              int64_t timestamp = av_rescale_q(timestamp_us, AV_TIME_BASE_Q, stream->time_base);

              if (av_seek_frame(vs->fmt_ctx, vs->video_stream_index, timestamp, AVSEEK_FLAG_BACKWARD) < 0)
                  return -1;

              avcodec_flush_buffers(vs->codec_ctx);

              AVPacket *pkt = av_packet_alloc();
              if (!pkt) return -1;

              int ret = -1;
              while (av_read_frame(vs->fmt_ctx, pkt) >= 0) {
                  if (pkt->stream_index == vs->video_stream_index) {
                      if (avcodec_send_packet(vs->codec_ctx, pkt) == 0) {
                          if (avcodec_receive_frame(vs->codec_ctx, vs->frame) == 0) {
                              ret = 0;
                              break;
                          }
                      }
                  }
                  av_packet_unref(pkt);
              }
              av_packet_free(&pkt);
              return ret;
          }

          static int frame_to_bitmap(JNIEnv *env, VideoState *vs, jobject bitmap) {
              void *pixels;
              if (AndroidBitmap_lockPixels(env, bitmap, &pixels) < 0) return -1;

              sws_scale(vs->sws_ctx,
                        (const uint8_t* const*)vs->frame->data, vs->frame->linesize,
                        0, vs->height,
                        vs->rgb_frame->data, vs->rgb_frame->linesize);

              memcpy(pixels, vs->rgb_buffer, vs->width * vs->height * 4);
              AndroidBitmap_unlockPixels(env, bitmap);
              return 0;
          }

          JNIEXPORT jlong JNICALL
          Java_com_rtfp_PlayerActivity_nativeOpenFile(JNIEnv *env, jobject thiz, jstring path) {
              const char *filename = (*env)->GetStringUTFChars(env, path, NULL);
              VideoState *vs = (VideoState*)av_mallocz(sizeof(VideoState));
              if (!vs) {
                  (*env)->ReleaseStringUTFChars(env, path, filename);
                  return 0;
              }
              vs->video_stream_index = -1;

              if (open_video_file(vs, filename) < 0) {
                  av_free(vs);
                  (*env)->ReleaseStringUTFChars(env, path, filename);
                  return 0;
              }
              (*env)->ReleaseStringUTFChars(env, path, filename);
              return (jlong)(intptr_t)vs;
          }

          JNIEXPORT jint JNICALL
          Java_com_rtfp_PlayerActivity_nativeSeekTo(JNIEnv *env, jobject thiz, jlong handle, jlong timestampUs) {
              VideoState *vs = (VideoState*)(intptr_t)handle;
              if (!vs) return -1;
              return seek_and_decode(vs, (int64_t)timestampUs);
          }

          JNIEXPORT jobject JNICALL
          Java_com_rtfp_PlayerActivity_nativeGetFrameAsBitmap(JNIEnv *env, jobject thiz, jlong handle) {
              VideoState *vs = (VideoState*)(intptr_t)handle;
              if (!vs || !vs->frame) return NULL;

              jclass bitmapClass = (*env)->FindClass(env, "android/graphics/Bitmap");
              jmethodID createBitmapMethod = (*env)->GetStaticMethodID(env, bitmapClass,
                                                "createBitmap",
                                                "(IILandroid/graphics/Bitmap$Config;)Landroid/graphics/Bitmap;");
              jclass configClass = (*env)->FindClass(env, "android/graphics/Bitmap$Config");
              jmethodID configValueOf = (*env)->GetStaticMethodID(env, configClass,
                                          "valueOf",
                                          "(Ljava/lang/String;)Landroid/graphics/Bitmap$Config;");
              jstring configName = (*env)->NewStringUTF(env, "ARGB_8888");
              jobject bitmapConfig = (*env)->CallStaticObjectMethod(env, configClass, configValueOf, configName);
              jobject bitmap = (*env)->CallStaticObjectMethod(env, bitmapClass, createBitmapMethod,
                                                               vs->width, vs->height, bitmapConfig);

              if (frame_to_bitmap(env, vs, bitmap) < 0) {
                  return NULL;
              }
              return bitmap;
          }

          JNIEXPORT void JNICALL
          Java_com_rtfp_PlayerActivity_nativeClose(JNIEnv *env, jobject thiz, jlong handle) {
              VideoState *vs = (VideoState*)(intptr_t)handle;
              if (!vs) return;
              if (vs->codec_ctx) avcodec_free_context(&vs->codec_ctx);
              if (vs->fmt_ctx) avformat_close_input(&vs->fmt_ctx);
              if (vs->frame) av_frame_free(&vs->frame);
              if (vs->rgb_frame) av_frame_free(&vs->rgb_frame);
              if (vs->rgb_buffer) av_free(vs->rgb_buffer);
              if (vs->sws_ctx) sws_freeContext(vs->sws_ctx);
              av_free(vs);
          }
          EOF

      - name: Build native wrapper library for arm64-v8a
        run: |
         export NDK_DIR=$(ls -d $ANDROID_HOME/ndk/* | head -n1)
         export TOOLCHAIN=$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64
         export ABI="arm64-v8a"
         export TRIPLE="aarch64-linux-android"
         export API_LEVEL=21
         
         $TOOLCHAIN/bin/${TRIPLE}${API_LEVEL}-clang \
         -I ffmpeg_src/install/$ABI/include \
         -L ffmpeg_src/install/$ABI/lib \
         -shared -o libffmpeg_wrapper.so ffmpeg_wrapper.c \
         -static-libstdc++ \
         -Wl,--no-undefined \
         -lavformat -lavcodec -lavutil -lswscale \
         -landroid -lz -lm

         mv libffmpeg_wrapper.so app/src/main/jniLibs/$ABI/

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
