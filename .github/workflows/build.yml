name: Build RTFP APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Generate project structure
      run: |
        # Create directory structure
        mkdir -p app/src/main/java/com/rtfp/player
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        
        # Copy all .kt files from root to package directory
        cp *.kt app/src/main/java/com/rtfp/player/ || echo "No .kt files found in root"
        
        echo "✓ Project structure created"
        echo "✓ Kotlin files copied"
    
    - name: Generate settings.gradle
      run: |
        cat > settings.gradle << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "RTFP"
        include ':app'
        EOF
        echo "✓ settings.gradle generated"
    
    - name: Generate root build.gradle
      run: |
        cat > build.gradle << 'EOF'
        // Root build.gradle - repositories are managed in settings.gradle
        buildscript {
            ext.kotlin_version = '1.9.22'
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.2.2'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
            }
        }

        task clean(type: Delete) {
            delete rootProject.buildDir
        }
        EOF
        echo "✓ root build.gradle generated"
    
    - name: Generate app build.gradle
      run: |
        cat > app/build.gradle << 'EOF'
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }

        android {
            namespace 'com.rtfp.player'
            compileSdk 34

            defaultConfig {
                applicationId "com.rtfp.player"
                minSdk 30
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
                debug {
                    debuggable true
                }
            }

            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }

            kotlinOptions {
                jvmTarget = '17'
            }

            buildFeatures {
                compose true
            }

            composeOptions {
                kotlinCompilerExtensionVersion '1.5.8'
            }

            packagingOptions {
                resources {
                    excludes += '/META-INF/{AL2.0,LGPL2.1}'
                }
            }
        }

        dependencies {
            // MPV Android Library (from Maven Central)
            implementation 'io.github.abdallahmehiz:mpv-android-lib:0.1.12'
            
            // Kotlin
            implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
            
            // AndroidX Core
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'androidx.activity:activity-compose:1.8.2'
            implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
            implementation 'androidx.lifecycle:lifecycle-viewmodel-compose:2.7.0'
            
            // Compose
            implementation platform('androidx.compose:compose-bom:2024.02.00')
            implementation 'androidx.compose.ui:ui'
            implementation 'androidx.compose.ui:ui-graphics'
            implementation 'androidx.compose.ui:ui-tooling-preview'
            implementation 'androidx.compose.material3:material3'
            implementation 'androidx.compose.runtime:runtime-livedata'
            
            // Coroutines
            implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
            implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3'
        }
        EOF
        echo "✓ app/build.gradle generated"
    
    - name: Generate AndroidManifest.xml
      run: |
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            
            <!-- Permissions -->
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                android:maxSdkVersion="32" />
            <uses-permission android:name="android.permission.WAKE_LOCK" />
            
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="RTFP"
                android:supportsRtl="true"
                android:theme="@style/Theme.RTFP"
                android:hardwareAccelerated="true">
                
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:configChanges="orientation|screenSize|keyboardHidden"
                    android:screenOrientation="landscape"
                    android:theme="@style/Theme.RTFP">
                    
                    <!-- Default launcher -->
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                    
                    <!-- Handle video file intents -->
                    <intent-filter>
                        <action android:name="android.intent.action.VIEW" />
                        <category android:name="android.intent.category.DEFAULT" />
                        <category android:name="android.intent.category.BROWSABLE" />
                        <data android:scheme="file" />
                        <data android:scheme="content" />
                        <data android:mimeType="video/*" />
                        <data android:mimeType="audio/*" />
                    </intent-filter>
                    
                    <!-- Handle share intents -->
                    <intent-filter>
                        <action android:name="android.intent.action.SEND" />
                        <category android:name="android.intent.category.DEFAULT" />
                        <data android:mimeType="video/*" />
                        <data android:mimeType="audio/*" />
                    </intent-filter>
                    
                    <!-- Handle HTTP/HTTPS URLs -->
                    <intent-filter>
                        <action android:name="android.intent.action.VIEW" />
                        <category android:name="android.intent.category.DEFAULT" />
                        <category android:name="android.intent.category.BROWSABLE" />
                        <data android:scheme="http" />
                        <data android:scheme="https" />
                        <data android:mimeType="video/*" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        echo "✓ AndroidManifest.xml generated"
    
    - name: Generate strings.xml
      run: |
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">RTFP</string>
        </resources>
        EOF
        echo "✓ strings.xml generated"
    
    - name: Generate themes.xml
      run: |
        cat > app/src/main/res/values/themes.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="Theme.RTFP" parent="android:Theme.Material.Light.NoActionBar.Fullscreen">
                <item name="android:statusBarColor">@android:color/black</item>
                <item name="android:navigationBarColor">@android:color/black</item>
                <item name="android:windowFullscreen">true</item>
            </style>
        </resources>
        EOF
        echo "✓ themes.xml generated"
    
    - name: Generate launcher icon
      run: |
        # Create a simple launcher icon using ImageMagick
        # For now, create placeholder icons
        echo "Creating launcher icons..."
        for dpi in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
          mkdir -p app/src/main/res/mipmap-$dpi
          # Create a simple colored square as placeholder
          # In a real scenario, you'd provide actual icon files
          touch app/src/main/res/mipmap-$dpi/ic_launcher.png
        done
        echo "✓ Launcher icons created (placeholders)"
    
    - name: Generate gradle.properties
      run: |
        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.enableJetifier=true
        kotlin.code.style=official
        org.gradle.parallel=true
        org.gradle.caching=true
        EOF
        echo "✓ gradle.properties generated"
    
    - name: Generate proguard-rules.pro
      run: |
        cat > app/proguard-rules.pro << 'EOF'
        # Add project specific ProGuard rules here.
        -keep class is.xyz.mpv.** { *; }
        -keep class com.rtfp.player.** { *; }
        -dontwarn is.xyz.mpv.**
        EOF
        echo "✓ proguard-rules.pro generated"
    
    - name: Grant execute permission for gradlew
      run: |
        # Download gradle wrapper if not exists
        if [ ! -f "gradlew" ]; then
          gradle wrapper --gradle-version 8.2
        fi
        chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: RTFP-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Build summary
      run: |
        echo "## 🎉 Build Successful!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**RTFP Player** has been built successfully!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Features:" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Single tap: Pause/Resume + Toggle UI" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Long press: 2x Speed playback" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Horizontal swipe: Real-time seeking" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Vertical swipe: Quick seek ±5s" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Progress bar: Drag to seek" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Auto-hide UI after 4s" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Download:" >> $GITHUB_STEP_SUMMARY
        echo "Download the APK from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
