name: Build RTFP Player

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Clone mpvEx
        run: git clone --depth 1 https://github.com/marlboro-advance/mpvEx.git player-core

      - name: Copy and fix your overlay
        run: |
          # Copy overlay to correct package
          mkdir -p player-core/app/src/main/java/app/marlboroadvance/mpvex/ui/player
          cp PlayerOverlay.kt player-core/app/src/main/java/app/marlboroadvance/mpvex/ui/player/

          # Fix imports: remove backticks and ensure MPVLib is imported
          sed -i 's/import `is`.xyz.mpv.MPVLib/import is.xyz.mpv.MPVLib/' player-core/app/src/main/java/app/marlboroadvance/mpvex/ui/player/PlayerOverlay.kt
          sed -i 's/import `is`.xyz.mpv.Utils/import is.xyz.mpv.Utils/' player-core/app/src/main/java/app/marlboroadvance/mpvex/ui/player/PlayerOverlay.kt

          # If MPVLib still not found, add explicit import at top (just in case)
          if ! grep -q "import is.xyz.mpv.MPVLib" player-core/app/src/main/java/app/marlboroadvance/mpvex/ui/player/PlayerOverlay.kt; then
            sed -i '1i import is.xyz.mpv.MPVLib' player-core/app/src/main/java/app/marlboroadvance/mpvex/ui/player/PlayerOverlay.kt
          fi

      - name: Change app name to RTFP
        run: |
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">RTFP<\/string>/' \
            player-core/app/src/main/res/values/strings.xml

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build release APK
        working-directory: player-core
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RTFP-Player
          path: player-core/app/build/outputs/apk/release/*.apk
