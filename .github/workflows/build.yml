name: Build RTFP Player

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo (contains workflow and overlay)
        uses: actions/checkout@v4

      - name: Clone mpvEx (Compose‑based player)
        run: git clone --depth 1 https://github.com/marlboro-advance/mpvEx.git player-core

      - name: Copy your custom overlay into the correct package
        run: |
          # Create the target directory if it doesn't exist
          mkdir -p player-core/app/src/main/java/app/marlboroadvance/mpvex/ui/player
          # Copy PlayerOverlay.kt from the root of your repo
          cp PlayerOverlay.kt player-core/app/src/main/java/app/marlboroadvance/mpvex/ui/player/

      - name: Change app name to RTFP
        run: |
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">RTFP<\/string>/' \
            player-core/app/src/main/res/values/strings.xml

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build release APK
        working-directory: player-core
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RTFP-Player
          path: player-core/app/build/outputs/apk/release/*.apk
