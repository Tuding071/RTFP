name: Build APK

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Android project
        run: |
          mkdir -p app/src/main/java/com/rtfp
          mkdir -p app/src/main/res/values
          mkdir -p app/libs

          # Copy Player.kt to source
          cp Player.kt app/src/main/java/com/rtfp/

          # Generate AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest package="com.rtfp">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:label="RTFP" android:theme="@style/Theme.AppCompat">
              <activity android:name=".PlayerActivity" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

          # Generate build.gradle.kts
          cat > app/build.gradle.kts << EOF
          plugins {
              id("com.android.application")
              kotlin("android")
          }
          android {
              namespace = "com.rtfp"
              compileSdk = 34
              defaultConfig {
                  minSdk = 21
                  targetSdk = 34
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
          }
          dependencies {
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("androidx.media3:media3-exoplayer:1.4.0")
              implementation("androidx.media3:media3-ui:1.4.0")
              implementation(fileTree(mapOf("dir" to "libs", "include" to listOf("*.jar", "*.so"))))
          }
          EOF

          # Generate settings.gradle.kts
          cat > settings.gradle.kts << EOF
          include(":app")
          EOF

      - name: Download FFmpeg prebuilt libraries
        run: |
          # Example: fetch ffmpeg-kit release for android
          wget https://github.com/arthenica/ffmpeg-kit/releases/download/v6.0/ffmpeg-kit-6.0-android-lib-release.zip
          unzip ffmpeg-kit-*-android-lib-release.zip -d ffmpeg-libs
          cp ffmpeg-libs/ffmpeg-kit/arm64-v8a/libffmpegkit.so app/libs/
          # Also copy for other ABIs if needed

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
